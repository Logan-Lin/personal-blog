base_url = "https://blog.yanlincs.com"
title = "Yan Lin's Blog"
description = "Personal blog of Yan Lin, Postdoctoral Researcher at Aalborg University"
default_language = "en"
compile_sass = true
minify_html = false
generate_feeds = true
feed_filenames = ["rss.xml"]
ignored_content = ["*.heic", "*.svg", "*.gif", "*.drawio", "*.png", "*.jpg", "*.jpeg", "*.mp4", "*.mov", "*.mkv"]

[markdown]
highlighting = { light_theme = "gruvbox-light-hard", dark_theme = "gruvbox-dark-hard" }
external_links_target_blank = true

[extra]
author = "Yan Lin"
